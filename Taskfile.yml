version: '3'

dotenv: ['.env']

vars:
  VENV: .venv
  PYTHON: "{{.VENV}}/bin/python"
  PIP: "{{.VENV}}/bin/pip"
  DUCKDB:
    sh: echo "$HOME/.duckdb/cli/latest/duckdb"
  DB: stats.duckdb

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ---------- setup ----------

  setup:
    desc: Create venv and install Python dependencies
    cmds:
      - python3 -m venv {{.VENV}}
      - "{{.PIP}} install --upgrade pip --quiet"
      - "{{.PIP}} install -r requirements.txt --quiet"
    status:
      - test -d {{.VENV}}
      - "{{.PYTHON}} -c 'import duckdb, fastapi, uvicorn' 2>/dev/null"

  # ---------- collection ----------

  probe:
    desc: 'Probe Cloudflare API to validate assumptions (forward args after --, e.g. task probe -- --hours 6)'
    deps: [setup]
    cmds:
      - "{{.PYTHON}} collector/probe.py {{.CLI_ARGS}}"

  collect:
    desc: 'Pull stats into DuckDB (default last 4h; e.g. task collect -- --hours 24)'
    deps: [setup]
    cmds:
      - "{{.PYTHON}} collector/collector.py {{.CLI_ARGS}}"

  views:
    desc: (Re)create classification + dashboard views
    cmds:
      - "{{.DUCKDB}} {{.DB}} < collector/views.sql"

  # ---------- queries ----------

  shell:
    desc: Open interactive DuckDB shell on the stats DB
    cmds:
      - "{{.DUCKDB}} {{.DB}}"

  query:
    desc: 'Run an ad-hoc SQL query (e.g. task query -- "SELECT 1")'
    cmds:
      - '{{.DUCKDB}} {{.DB}} -c "{{.CLI_ARGS}}"'

  summary:
    desc: Headline blog/site/spam category split
    cmds:
      - |
        {{.DUCKDB}} {{.DB}} -c "
          SELECT category,
                 SUM(requests) AS requests,
                 ROUND(100.0 * SUM(requests) / SUM(SUM(requests)) OVER (), 1) AS pct
          FROM v_by_category_hourly
          GROUP BY 1
          ORDER BY requests DESC;"

  top-blog:
    desc: Top blog posts (last 30 days)
    cmds:
      - "{{.DUCKDB}} {{.DB}} -c 'SELECT * FROM v_top_blog_30d;'"

  top-spam:
    desc: Top scanner targets (last 30 days) — use to refine views.sql rules
    cmds:
      - "{{.DUCKDB}} {{.DB}} -c 'SELECT * FROM v_top_spam_30d;'"

  countries:
    desc: Country breakdown for legit (non-spam) traffic
    cmds:
      - "{{.DUCKDB}} {{.DB}} -c 'SELECT * FROM v_country_30d;'"

  daily:
    desc: Daily blog/site/spam split
    cmds:
      - "{{.DUCKDB}} {{.DB}} -c 'SELECT * FROM v_daily_split;'"

  # ---------- dashboard ----------

  serve:
    desc: 'Start local dashboard at http://localhost:8080 (e.g. task serve -- --port 9090)'
    deps: [setup]
    cmds:
      - "{{.PYTHON}} serve.py {{.CLI_ARGS}}"

  # ---------- systemd (user service, rootless) ----------

  systemd:install:
    desc: Symlink all unit files into ~/.config/systemd/user/ and reload daemon
    cmds:
      - mkdir -p ~/.config/systemd/user
      - ln -sf {{.TASKFILE_DIR}}/systemd/cf-stats.service     ~/.config/systemd/user/
      - ln -sf {{.TASKFILE_DIR}}/systemd/cf-stats.timer       ~/.config/systemd/user/
      - ln -sf {{.TASKFILE_DIR}}/systemd/cf-stats-web.service ~/.config/systemd/user/
      - systemctl --user daemon-reload
      - echo "Units installed. Run 'task systemd:enable' then 'task systemd:web:enable'."

  systemd:enable:
    desc: Enable linger + start hourly timer
    cmds:
      - loginctl enable-linger $USER
      - systemctl --user enable --now cf-stats.timer
      - systemctl --user status cf-stats.timer --no-pager

  systemd:disable:
    desc: Stop and disable the timer
    cmds:
      - systemctl --user disable --now cf-stats.timer

  systemd:status:
    desc: Show status of service and timer
    cmds:
      - systemctl --user status cf-stats.service cf-stats.timer --no-pager || true

  systemd:logs:
    desc: Recent collector logs (last 50 lines)
    cmds:
      - journalctl --user -u cf-stats.service -n 50 --no-pager

  systemd:run:
    desc: Trigger a one-shot collection now (bypass the timer)
    cmds:
      - systemctl --user start cf-stats.service
      - journalctl --user -u cf-stats.service -n 20 --no-pager

  systemd:web:enable:
    desc: Enable and start the web dashboard service
    cmds:
      - systemctl --user enable --now cf-stats-web.service
      - systemctl --user status cf-stats-web.service --no-pager

  systemd:web:disable:
    desc: Stop and disable the web dashboard service
    cmds:
      - systemctl --user disable --now cf-stats-web.service

  systemd:web:restart:
    desc: Restart the web dashboard service
    cmds:
      - systemctl --user restart cf-stats-web.service

  systemd:web:logs:
    desc: Recent web dashboard logs (last 50 lines)
    cmds:
      - journalctl --user -u cf-stats-web.service -n 50 --no-pager

  systemd:web:status:
    desc: Show web dashboard service status
    cmds:
      - systemctl --user status cf-stats-web.service --no-pager

  # ---------- maintenance ----------

  backup:
    desc: Snapshot DuckDB to backups/<timestamp>/ as parquet + SQL
    cmds:
      - mkdir -p backups
      - |
        {{.DUCKDB}} {{.DB}} -c "EXPORT DATABASE 'backups/$(date +%Y%m%d-%H%M%S)' (FORMAT 'parquet');"

  clean:
    desc: Remove the DuckDB file (DESTRUCTIVE)
    prompt: This deletes {{.DB}} and any uncommitted views. Continue?
    cmds:
      - rm -f {{.DB}} {{.DB}}.wal
